name: Mining Parser
on:
  workflow_dispatch:
    inputs:
      category:
        description: "Категория поиска"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - hosting
          - mining

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install requests pandas beautifulsoup4 lxml tqdm openpyxl

      - name: Создать папку output
        run: mkdir -p output

      - name: Поиск хостингов и ЦОД (ОКВЭД → ЕГРЮЛ → ГИРБО)
        if: ${{ github.event.inputs.category == 'both' || github.event.inputs.category == 'hosting' }}
        run: python girbo_parser.py --category hosting --source api --debug

      - name: Поиск майнеров (Федресурс → ГИРБО)
        if: ${{ github.event.inputs.category == 'both' || github.event.inputs.category == 'mining' }}
        run: python girbo_parser.py --category mining --source api --debug

      - name: Показать результаты (диагностика)
        if: always()
        run: |
          echo "=== Файлы в output/ ==="
          ls -lah output/ || echo "output/ не найден"
          echo ""
          echo "=== run_report hosting ==="
          cat output/run_report_hosting_*.txt 2>/dev/null || echo "файл не найден"
          echo ""
          echo "=== run_report mining ==="
          cat output/run_report_mining_*.txt 2>/dev/null || echo "файл не найден"
          echo ""
          echo "=== ИНН хостинг (первые 10) ==="
          head -10 output/inns_hosting_*.txt 2>/dev/null || echo "файл не найден"
          echo "Строк:" $(wc -l < output/inns_hosting_*.txt 2>/dev/null || echo 0)
          echo ""
          echo "=== ИНН майнинг (первые 10) ==="
          head -10 output/inns_mining_*.txt 2>/dev/null || echo "файл не найден"
          echo "Строк:" $(wc -l < output/inns_mining_*.txt 2>/dev/null || echo 0)
          echo ""
          echo "=== CSV файлы ==="
          ls -lah output/*.csv 2>/dev/null || echo "CSV не найдено"
          echo ""
          echo "=== Первые 5 строк CSV (hosting) ==="
          head -5 output/mining_leads_hosting_*.csv 2>/dev/null || echo "нет CSV"
          echo ""
          echo "=== Первые 5 строк CSV (mining) ==="
          head -5 output/mining_leads_mining_*.csv 2>/dev/null || echo "нет CSV"

      - name: Сохранить результаты
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mining-leads-${{ github.run_number }}
          path: output/
          if-no-files-found: warn

