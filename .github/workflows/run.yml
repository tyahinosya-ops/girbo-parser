name: Федресурс — лизинг майнинг-оборудования

on:
  workflow_dispatch:

  schedule:
    - cron: "0 3 * * 0"

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установить зависимости
        run: |
          pip install --upgrade pip
          pip install "httpx[http2]"

      - name: Создать папку output
        run: mkdir -p output

      - name: Поиск лизинга оборудования на Федресурсе
        run: |
          python fedresurs_session.py \
            --out "output/fedresurs_leasing_$(date +%Y-%m-%d).csv"

      - name: Показать итоги
        if: always()
        run: |
          echo "=== Файлы в output/ ==="
          ls -lah output/ 2>/dev/null || echo "Папка output пуста"
          echo ""
          echo "=== Первые 20 строк CSV ==="
          head -20 output/fedresurs_leasing_*.csv 2>/dev/null || echo "CSV не создан"
          echo ""
          CSV=$(ls output/fedresurs_leasing_*.csv 2>/dev/null | head -1)
          if [ -n "$CSV" ]; then
            COUNT=$(tail -n +2 "$CSV" | wc -l)
            WITH_INN=$(awk -F',' 'NR>1 && length($2)>=10' "$CSV" | wc -l)
          else
            COUNT=0; WITH_INN=0
          fi
          echo "::notice::Федресурс: записей=$COUNT, с ИНН=$WITH_INN"

      - name: Сохранить результаты
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedresurs-leasing-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: warn
