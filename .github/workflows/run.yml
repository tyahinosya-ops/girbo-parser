name: Mining Parser
on:
  workflow_dispatch:
    inputs:
      category:
        description: "Категория поиска"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - hosting
          - mining

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install requests pandas beautifulsoup4 lxml tqdm openpyxl

      - name: Создать папку output
        run: mkdir -p output

      - name: Поиск хостингов и ЦОД (ОКВЭД → ЕГРЮЛ → ГИРБО)
        if: ${{ github.event.inputs.category == 'both' || github.event.inputs.category == 'hosting' }}
        run: python girbo_parser.py --category hosting --source api --debug

      - name: Поиск майнеров (Федресурс → ГИРБО)
        if: ${{ github.event.inputs.category == 'both' || github.event.inputs.category == 'mining' }}
        run: python girbo_parser.py --category mining --source api --debug

      - name: Диагностика — вывести отчёты
        if: always()
        run: |
          echo "===FILES==="
          ls -lah output/
          echo "===HOSTING_REPORT==="
          cat output/run_report_hosting_*.txt 2>/dev/null || echo "HOSTING_REPORT_NOT_FOUND"
          echo "===MINING_REPORT==="
          cat output/run_report_mining_*.txt 2>/dev/null || echo "MINING_REPORT_NOT_FOUND"
          echo "===INNS_HOSTING==="
          wc -l output/inns_hosting_*.txt 2>/dev/null && head -5 output/inns_hosting_*.txt 2>/dev/null || echo "INN_HOSTING_NOT_FOUND"
          echo "===INNS_MINING==="
          wc -l output/inns_mining_*.txt 2>/dev/null && head -5 output/inns_mining_*.txt 2>/dev/null || echo "INN_MINING_NOT_FOUND"
          echo "===CSV_HOSTING==="
          wc -l output/mining_leads_hosting_*.csv 2>/dev/null && head -3 output/mining_leads_hosting_*.csv 2>/dev/null || echo "CSV_HOSTING_NOT_FOUND"
          echo "===CSV_MINING==="
          wc -l output/mining_leads_mining_*.csv 2>/dev/null && head -3 output/mining_leads_mining_*.csv 2>/dev/null || echo "CSV_MINING_NOT_FOUND"
          HOSTING_INN_COUNT=$(wc -l < output/inns_hosting_*.txt 2>/dev/null || echo 0)
          MINING_INN_COUNT=$(wc -l < output/inns_mining_*.txt 2>/dev/null || echo 0)
          CSV_HOST=$(wc -l < output/mining_leads_hosting_*.csv 2>/dev/null || echo 0)
          CSV_MIN=$(wc -l < output/mining_leads_mining_*.csv 2>/dev/null || echo 0)
          echo "::warning::ИТОГ: хостинг_ИНН=$HOSTING_INN_COUNT майнинг_ИНН=$MINING_INN_COUNT хостинг_CSV=$CSV_HOST майнинг_CSV=$CSV_MIN"

      - name: Сохранить результаты
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mining-leads-${{ github.run_number }}
          path: output/
          if-no-files-found: warn

