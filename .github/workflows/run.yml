name: Федресурс — лизинг майнинг-оборудования

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Макс. записей на одно ключевое слово"
        required: false
        default: "1000"
        type: string

  schedule:
    # Каждое воскресенье в 03:00 UTC
    - cron: "0 3 * * 0"

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установить зависимости
        run: |
          pip install --upgrade pip
          pip install "httpx[http2]" pandas openpyxl

      - name: Создать папку output
        run: mkdir -p output

      - name: Поиск лизинга (antminer / whatsminer / bitmain / microbt / эвм / сервер)
        run: |
          python fedresurs_keyword_search.py \
            --limit ${{ github.event.inputs.limit || '1000' }} \
            --out "output/fedresurs_leasing_$(date +%Y-%m-%d).csv"

      - name: Показать итоги
        if: always()
        run: |
          echo "=== Файлы в output/ ==="
          ls -lah output/
          echo ""
          echo "=== Первые 20 строк CSV ==="
          head -20 output/fedresurs_leasing_*.csv 2>/dev/null || echo "CSV не найден"
          echo ""
          echo "=== Статистика ==="
          COUNT=$(tail -n +2 output/fedresurs_leasing_*.csv 2>/dev/null | wc -l || echo 0)
          WITH_INN=$(tail -n +2 output/fedresurs_leasing_*.csv 2>/dev/null | awk -F',' 'NR>1 && $1~/[0-9]{10}/' | wc -l || echo 0)
          echo "Всего записей: $COUNT"
          echo "С ИНН:         $WITH_INN"
          echo "::notice::Федресурс: записей=$COUNT, с ИНН=$WITH_INN"

      - name: Сохранить результаты
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedresurs-leasing-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: warn
